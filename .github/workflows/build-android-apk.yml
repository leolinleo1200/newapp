name: Build Android APK

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Recreate missing platform folders
        run: flutter create --platforms=android,ios,web --overwrite .

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aquatrack-android-apk
          path: frontend/build/app/outputs/flutter-apk/*.apk

      - name: Commit APK into repo (for clone visibility)
        run: |
          mkdir -p apk
          cp frontend/build/app/outputs/flutter-apk/app-release.apk apk/app-release.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain apk/app-release.apk)" ]; then
            echo "No APK change to commit"
            exit 0
          fi
          git add apk/app-release.apk
          git commit -m "chore: update generated APK"
          git push origin HEAD:${GITHUB_REF_NAME}
